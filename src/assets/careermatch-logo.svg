<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGrad)" opacity="0.1"/>

  <!-- Left side: Ascending career arc (human element) -->
  <g id="career">
    <!-- Ascending path with nodes -->
    <path d="M 60 140 Q 70 120, 80 100 Q 90 80, 100 60"
          stroke="url(#logoGrad)" stroke-width="8" fill="none" stroke-linecap="round"/>

    <!-- Career milestone dots -->
    <circle cx="60" cy="140" r="5" fill="url(#logoGrad)"/>
    <circle cx="80" cy="100" r="5" fill="url(#logoGrad)"/>
    <circle cx="100" cy="60" r="6" fill="url(#logoGrad)"/>
  </g>

  <!-- Right side: AI neural pathways (technology element) -->
  <g id="ai" opacity="0.9">
    <!-- Main neural nodes -->
    <circle cx="140" cy="140" r="4" fill="url(#logoGrad)"/>
    <circle cx="140" cy="100" r="4" fill="url(#logoGrad)"/>
    <circle cx="140" cy="60" r="5" fill="url(#logoGrad)"/>

    <!-- Neural connections creating a unique pattern -->
    <line x1="140" y1="140" x2="135" y2="120" stroke="url(#logoGrad)" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <line x1="135" y1="120" x2="140" y2="100" stroke="url(#logoGrad)" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <line x1="140" y1="100" x2="135" y2="80" stroke="url(#logoGrad)" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <line x1="135" y1="80" x2="140" y2="60" stroke="url(#logoGrad)" stroke-width="2" opacity="0.7" stroke-linecap="round"/>

    <!-- Secondary neural branches -->
    <line x1="135" y1="120" x2="145" y2="110" stroke="url(#logoGrad)" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="135" y1="80" x2="145" y2="90" stroke="url(#logoGrad)" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  </g>

  <!-- Center: Unique matching intersection (the magic) -->
  <g id="match">
    <!-- Hexagonal convergence point - never before seen in this way -->
    <polygon points="100,50 110,65 110,95 100,110 90,95 90,65"
             fill="url(#logoGrad)" opacity="0.3" filter="url(#glow)"/>

    <!-- Central spark/connection point -->
    <circle cx="100" cy="80" r="3" fill="url(#logoGrad)"/>

    <!-- Radiating connection lines (symbolic of perfect match) -->
    <line x1="100" y1="80" x2="100" y2="60" stroke="url(#logoGrad)" stroke-width="2" opacity="0.6"/>
    <line x1="100" y1="80" x2="115" y2="90" stroke="url(#logoGrad)" stroke-width="2" opacity="0.6"/>
    <line x1="100" y1="80" x2="85" y2="90" stroke="url(#logoGrad)" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Top element: Ascending trajectory marker -->
  <g id="trajectory">
    <path d="M 100 45 L 105 35 L 100 38" fill="url(#logoGrad)" stroke="url(#logoGrad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Subtle enhancement: Orbiting particles (representing data/AI movement) -->
  <g id="particles" opacity="0.4">
    <circle cx="75" cy="75" r="2" fill="url(#logoGrad)"/>
    <circle cx="125" cy="125" r="2" fill="url(#logoGrad)"/>
    <circle cx="70" cy="110" r="1.5" fill="url(#logoGrad)"/>
    <circle cx="130" cy="70" r="1.5" fill="url(#logoGrad)"/>
  </g>
</svg>
